<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceder — El Lugar Olvidado</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="login-body">

  <div class="login-container">

    <div class="login-brand">
      <a href="index.html" class="login-logo">El Lugar Olvidado</a>
      <p class="login-tagline">Donde las preguntas importan más que las respuestas.</p>
    </div>

    <div class="login-card">
      <h1 class="login-titulo">Acceder al foro</h1>
      <p class="login-sub">Únete a la conversación. Solo necesitas una cuenta de Google.</p>

      <button class="login-google-btn" onclick="loginWithGoogle()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continuar con Google
      </button>

      <p class="login-aviso">Al acceder aceptas participar con respeto y buena fe.<br>Este es un espacio para pensar, no para atacar.</p>
    </div>

    <div class="login-footer">
      <a href="manifiesto.html">Leer el manifiesto</a>
      <span>·</span>
      <a href="autor.html">Sobre el autor</a>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>

</body>
</html>
